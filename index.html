<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #f0f5f9; 
            margin: 0; 
            padding: 15px; 
        }

        /* Wadah Utama */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Kotak Produk (Card) - Mirip tampilan aplikasi kamu */
        .card {
            background: white;
            border: 2px solid #e06c4d; /* Warna garis tepi oranye seperti di foto */
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        /* Nama Barang di Atas Sendiri */
        .nama-barang {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
        }

        /* Bagian Tengah (Gambar & Harga di kiri, Keterangan di kanan) */
        .konten-bawah {
            display: flex;
            gap: 15px;
        }

        /* Sisi Kiri: Gambar dan Harga di bawahnya */
        .sisi-kiri {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120px; /* Lebar tetap untuk area gambar */
        }

        .gambar-produk {
            width: 100px;
            height: 100px;
            border: 3px solid black; /* Bingkai hitam tebal */
            border-radius: 8px;
            object-fit: cover;
            background-color: #eee;
        }

        .harga-barang {
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
            color: #000;
        }

        /* Sisi Kanan: Keterangan Barang */
        .sisi-kanan {
            flex: 1; /* Mengambil sisa ruang */
            font-size: 13px;
            color: #555;
            display: flex;
            flex-direction: column;
        }

        .label-detail {
            font-style: italic;
            color: #888;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="list-container" id="produk-list">
        </div>

    <script>
        fetch('data_produk.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('produk-list');
                data.forEach(p => {
                    const card = `
                        <div class="card">
                            <div class="nama-barang">${p.nama_produk}</div>
                            
                            <div class="konten-bawah">
                                <div class="sisi-kiri">
                                    <img src="${p.gambar}" class="gambar-produk" onerror="this.src='https://via.placeholder.com/100?text=No+Image'">
                                    <div class="harga-barang">${p.harga}</div>
                                </div>

                                <div class="sisi-kanan">
                                    <div class="label-detail">Detail / Cocok untuk :</div>
                                    <div>${p.keterangan}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    list.innerHTML += card;
                });
            });
    </script>
</body>
</html>
